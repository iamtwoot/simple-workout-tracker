<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workout</title>
</head>
<body>
    {{ workout.name }}
    {{ workout.workout_date }}
    {{ workout.notes }}

    <hr>

    <a href="{{ url_for('exercises.create_exercise', workout_id=workout.id) }}">Add Exercise</a>

    <hr>

{% for exercise in workout.exercises %}
    {{ exercise.name }}
    {{ exercise.sets }}

{% endfor %}
</body>
</html>
